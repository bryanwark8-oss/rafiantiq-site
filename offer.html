<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafiant IQ — Offer</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">
            <img src="static/logos/instamind-clean.svg" alt="Rafiant IQ Logo" />
        </a>

        <div class="nav-links">
            <a href="map.html">Map</a>
            <a href="offer.html" class="active">Offer</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <!-- Offer Renderer -->
    <div class="offer-container">

        <!-- Top row: SmartScore + New Offer -->
        <div class="offer-header-row">
            <div class="smartscore-block">
                <h1 id="smartScore" class="smartscore-value">—</h1>
                <p class="smartscore-label">SmartScore</p>
            </div>

            <div class="offer-meta">
                <p><strong>Restaurant:</strong> <span id="offerRestaurant">—</span></p>
                <p><strong>Zone:</strong> <span id="offerZone">—</span></p>
                <p><strong>Mode:</strong> <span id="offerMode">—</span></p>
            </div>

            <div class="offer-actions-top">
                <button id="newOfferBtn" class="secondary-btn">NEW OFFER</button>
            </div>
        </div>

        <!-- True Profit Block -->
        <div class="profit-block">
            <h2>True Profit</h2>
            <p id="trueProfit" class="profit-value">—</p>

            <div class="profit-details">
                <p><strong>Payout:</strong> <span id="payout">—</span></p>
                <p><strong>Miles:</strong> <span id="miles">—</span></p>
                <p><strong>Minutes:</strong> <span id="minutes">—</span></p>
                <p><strong>Gas Cost:</strong> <span id="gasCost">—</span></p>
                <p><strong>Profit/hr:</strong> <span id="profitPerHour">—</span></p>
                <p><strong>Profit/mi:</strong> <span id="profitPerMile">—</span></p>
            </div>
        </div>

        <!-- Recommendation -->
        <div class="recommendation-block">
            <h2 id="recommendation">Recommendation: —</h2>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="accept">ACCEPT</button>
            <button class="skip">SKIP</button>
        </div>

    </div>

    <!-- Logic (order matters) -->
    <script src="js/offer-sim.js"></script>
    <script src="js/trueprofit.js"></script>
    <script src="js/smartscore.js"></script>
    <script src="js/zoneiq.js"></script>
    <script src="js/restaurantiq.js"></script>
    <script src="js/modeiq.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/offer-renderer.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Wire up NEW OFFER button to re-run the whole flow
        document.addEventListener("DOMContentLoaded", () => {
            const btn = document.getElementById("newOfferBtn");
            if (!btn) return;

            btn.addEventListener("click", () => {
                if (typeof initOfferPage === "function") {
                    initOfferPage();
                }
            });
        });
    </script>

</body>
</html>
