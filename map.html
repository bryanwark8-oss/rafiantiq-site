<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafiant IQ — Map</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">
            <img src="static/logos/instamind-clean.svg" alt="Rafiant IQ Logo" />
        </a>

        <div class="nav-links">
            <a href="map.html" class="active">Map</a>
            <a href="offer.html">Offer</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <!-- Map Layout -->
    <div class="map-layout">

        <!-- Map -->
        <div id="map"></div>

        <!-- Sidebar -->
        <div class="map-sidebar card">
            <h2>Zone IQ</h2>

            <p><strong>Zone:</strong> <span id="zoneName">—</span></p>
            <p><strong>Performance:</strong> <span id="personalPerformance">—</span></p>
            <p><strong>Profitability:</strong> <span id="zoneProfit">—</span></p>
            <p><strong>Peak Times:</strong> <span id="zoneTimes">—</span></p>

            <p style="margin-top:20px; color:#888;">Tap any zone on the map to analyze it.</p>
        </div>

    </div>

    <!-- Logic -->
    <script src="js/zoneiq.js"></script>
    <script src="js/map-engine.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
